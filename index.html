<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旋转寿司</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;600;800&family=Press+Start+2P&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/arena.css" />
  <link rel="stylesheet" href="css/builder.css" />
  <link rel="stylesheet" href="css/i18n.css" />
</head>
<body>
  <!-- Hidden arena trigger: disguised "do not press" button -->
  <button id="red-button" class="red-button" aria-label="请勿按下">
    <span class="rb-cap"></span>
    <span class="rb-label" data-i18n="do.not.press"></span>
  </button>

  <!-- HUD bar -->
  <header class="topbar">
    <div class="brand" data-i18n="brand"></div>
    <nav class="nav">
      <a href="#menu" data-i18n="nav.menu"></a>
      <a href="#about" data-i18n="nav.story"></a>
      <span class="points-hud" aria-label="Points">
        <span class="ph-star" aria-hidden="true">★</span>
        <span class="ph-label" data-i18n="hud.points"></span>
        <span id="points-count" class="ph-count">0</span>
      </span>
      <button id="battle-btn" class="battle-btn">
        <span aria-hidden="true">⚔</span> <span data-i18n="hud.battle"></span>
      </button>
      <button id="cart-toggle" class="cart-toggle" aria-label="打开订单">
        <span class="coin-ico" aria-hidden="true">◎</span> <span data-i18n="nav.bag"></span>
        <span id="cart-count" class="cart-badge">0</span>
      </button>
      <button id="tray-toggle" class="cart-toggle" aria-label="打开托盘">
        <span class="coin-ico" aria-hidden="true">🍱</span> <span data-i18n="hud.tray"></span>
        <span id="tray-count" class="cart-badge">0</span>
      </button>
    </nav>
  </header>

  <main id="shop">
    <!-- HERO — the shopfront, JRPG style -->
    <section class="hero">
      <div class="hero-speedlines" aria-hidden="true"></div>
      <div class="hero-halftone" aria-hidden="true"></div>

      <div class="hero-inner">
        <div class="hero-copy">
          <p class="hero-kana" data-i18n="hero.kana"></p>
          <h1 class="hero-title" data-i18n="hero.title"></h1>
          <p class="hero-tag" data-i18n="hero.tag"></p>
        </div>

        <!-- The shopkeeper, framed as a character portrait -->
        <div class="shopfront" aria-hidden="true">
          <div class="master">
            <img class="master-img" src="assets/shopkeep.png" alt="The shopkeeper"
                 onerror="this.style.display='none'" />
          </div>
        </div>
      </div>

      <!-- JRPG dialogue box -->
      <div class="dialogue" id="dialogue" role="button" tabindex="0" aria-label="Advance dialogue">
        <span class="dialogue-name" data-i18n="chef.name"></span>
        <p class="dialogue-text" id="dialogue-text"></p>
        <span class="dialogue-next" id="dialogue-next" aria-hidden="true">▼</span>
      </div>

      <a class="press-start" href="#menu" id="press-start">
        <span class="ps-blip">▶</span> <span data-i18n="press.start"></span>
      </a>
    </section>

    <!-- MENU / WARES -->
    <section id="menu" class="menu">
      <h2 class="section-title"><span data-i18n="menu.title"></span> <span class="kana" data-i18n="menu.kana"></span></h2>
      <p class="menu-sub" data-i18n="menu.sub"></p>
      <p class="pinyin-hint" aria-hidden="true">👆 tap any 字 for pinyin + sound</p>
      <div id="menu-grid" class="menu-grid"><!-- rendered by main.js --></div>
    </section>

    <!-- ABOUT / STORY -->
    <section id="about" class="about">
      <div class="about-panel">
        <h2 class="section-title"><span data-i18n="story.title"></span> <span class="kana" data-i18n="story.kana"></span></h2>
        <p data-i18n="story.p1"></p>
        <p data-i18n="story.p2"></p>
      </div>
    </section>
  </main>

  <!-- CART DRAWER -->
  <aside id="cart-drawer" class="cart-drawer" aria-hidden="true">
    <div class="cart-head">
      <h2 data-i18n="cart.title"></h2>
      <button id="cart-close" class="cart-close" aria-label="关闭订单">✕</button>
    </div>
    <ul id="cart-lines" class="cart-lines"><!-- rendered by main.js --></ul>
    <div class="cart-foot">
      <div class="cart-total"><span data-i18n="cart.total"></span> <span id="cart-total">0</span></div>
      <button id="checkout" class="btn-primary btn-block" data-i18n="cart.checkout"></button>
      <p id="cart-confirm" class="cart-confirm" hidden data-i18n="cart.confirm"></p>
    </div>
  </aside>
  <div id="cart-scrim" class="scrim" hidden></div>
  <!-- TRAY DRAWER — eat your ordered sushi -->
  <aside id="tray-drawer" class="cart-drawer tray-drawer" aria-hidden="true">
    <div class="cart-head">
      <h2 data-i18n="tray.title"></h2>
      <span class="tray-eaten"><span data-i18n="tray.eaten"></span> <span id="eaten-count">0</span></span>
      <button id="tray-close" class="cart-close" aria-label="关闭托盘">✕</button>
    </div>
    <ul id="tray-lines" class="cart-lines"><!-- rendered by main.js --></ul>
    <p class="tray-hint" aria-hidden="true">👆 hold a piece to eat it</p>
  </aside>
  <div id="tray-scrim" class="scrim" hidden></div>
  <div id="eat-flourish" class="eat-flourish" hidden></div>

  <!-- BUILDER SCREEN (hidden until red button) -->
  <div id="builder" class="builder" hidden>
    <div class="builder-panel">
      <button id="builder-close" class="builder-close" aria-label="Back to shop">✕</button>
      <h2 class="builder-title" data-i18n="build.title"></h2>
      <div class="builder-body">
        <div class="builder-preview">
          <img id="builder-blade-img" class="builder-blade-img" alt="" />
          <p id="builder-name" class="builder-name"></p>
        </div>
        <div class="builder-config">
          <div class="builder-selects">
            <label class="builder-field"><span data-i18n="build.blade"></span> <select id="sel-blade" class="part-select" aria-label="Blade"></select></label>
            <label class="builder-field"><span data-i18n="build.ratchet"></span> <select id="sel-ratchet" class="part-select" aria-label="Ratchet"></select></label>
            <label class="builder-field"><span data-i18n="build.bit"></span> <select id="sel-bit" class="part-select" aria-label="Bit"></select></label>
          </div>
          <div id="builder-graph" class="builder-graph"></div>
        </div>
      </div>
      <button id="builder-battle" class="btn-launch builder-battle">⚔ <span data-i18n="build.battle"></span></button>
    </div>
  </div>

  <!-- ARENA OVERLAY (hidden until red button) -->
  <div id="arena" class="arena" hidden>
    <div class="arena-hud">
      <div class="arena-title" data-i18n="arena.title"></div>
      <div class="arena-score">
        <span class="score-side you"><span data-i18n="arena.you"></span> <span id="score-you" class="pips"></span></span>
        <span id="score-streak" class="score-streak">🔥 0</span>
        <span class="score-side rival"><span id="score-rival" class="pips"></span> <span data-i18n="arena.rival"></span></span>
      </div>
      <div class="arena-hud-right">
        <button id="arena-mute" class="arena-mute" aria-pressed="false" title="Mute sound">🔊</button>
        <button id="arena-exit" class="arena-exit" data-i18n="arena.exit"></button>
      </div>
    </div>

    <div class="arena-meters">
      <div class="meter you">
        <span class="meter-label" data-i18n="arena.you"></span>
        <div class="meter-track"><div id="meter-you" class="meter-fill"></div></div>
        <div id="build-you" class="build-imgs" aria-hidden="true"></div>
      </div>
      <div class="meter rival">
        <span class="meter-label" data-i18n="arena.rival"></span>
        <div class="meter-track"><div id="meter-rival" class="meter-fill"></div></div>
        <div id="build-rival" class="build-imgs" aria-hidden="true"></div>
      </div>
    </div>

    <canvas id="arena-canvas" class="arena-canvas" width="720" height="720"></canvas>

    <div class="arena-controls">
      <div class="ctrl seg">
        <span class="seg-label" data-i18n="arena.spin.label"></span>
        <div class="seg-btns" id="spin-dir" role="group" aria-label="Spin direction">
          <button type="button" class="seg-btn is-on" data-dir="1" aria-pressed="true">↻ <span data-i18n="arena.spin.right"></span></button>
          <button type="button" class="seg-btn" data-dir="-1" aria-pressed="false">↺ <span data-i18n="arena.spin.left"></span></button>
        </div>
      </div>
      <label class="ctrl"><span data-i18n="arena.angle"></span>
        <input id="angle" type="range" min="0" max="360" value="45" />
      </label>
      <div class="power-wrap">
        <div class="power-label" data-i18n="arena.power"></div>
        <div class="power-track"><div id="power-fill" class="power-fill"></div></div>
      </div>
      <div class="power-wrap">
        <div class="power-label" data-i18n="arena.burst"></div>
        <div class="power-track"><div id="burst-fill" class="burst-fill"></div></div>
      </div>
      <button id="launch" class="btn-launch">HOLD&nbsp;TO&nbsp;CHARGE</button>
      <button id="special" class="btn-special" disabled data-i18n="arena.special"></button>
      <button id="next-round" class="btn-primary" hidden>Next Round</button>
      <button id="rematch" class="btn-primary" hidden>Rematch</button>
    </div>
    <p id="rival-setup" class="rival-setup"></p>

    <p id="arena-rules" class="arena-rules" data-i18n="arena.rules"></p>

    <div id="arena-callout" class="arena-callout" hidden></div>
    <div id="arena-banner" class="arena-banner" hidden></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
